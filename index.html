<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stickman Commando</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-wrapper">
    <header id="hud">
      <div class="hud-block">
        <span class="hud-label">HP</span>
        <div class="health-bar">
          <div id="health-fill"></div>
        </div>
        <span id="health-text">100</span>
      </div>
      <div class="hud-block hud-center">
        <h1>Stickman Commando</h1>
        <span id="mode-badge" hidden></span>
      </div>
      <div class="hud-block hud-right">
        <button id="hud-autoshoot" type="button" class="toggle-btn" hidden>Auto: OFF</button>
        <span class="hud-label">Score</span>
        <span id="score">0</span>
        <span class="hud-divider">|</span>
        <span class="hud-label">Best</span>
        <span id="high-score">0</span>
      </div>
    </header>

    <canvas id="game" width="960" height="540"></canvas>
    <div id="wave-banner" class="wave-banner"></div>
    <div id="play-controls" hidden>
      <button id="speed-btn" type="button" aria-label="Game speed">1×</button>
      <button id="exit-btn" type="button" aria-label="Exit to menu">×</button>
    </div>

    <div id="overlay">
      <div id="overlay-content">
        <h2 id="overlay-title">Stickman Commando</h2>
        <p id="overlay-subtitle"></p>
        <p id="overlay-hint">↑ ↓ ← → move &nbsp;·&nbsp; SPACE shoot &nbsp;·&nbsp; mouse aim</p>
        <div id="mode-picker" hidden></div>
        <div id="model-picker-wrap" hidden>
          <canvas id="model-preview" width="72" height="72" aria-hidden="true"></canvas>
          <div class="model-picker-anchor">
            <button id="model-btn" type="button" aria-haspopup="listbox" aria-expanded="false">Model · Classic</button>
            <div id="model-menu" class="model-menu" role="listbox" hidden></div>
          </div>
        </div>
        <div id="overlay-actions">
          <button id="start-btn" type="button" hidden>Deploy</button>
          <button id="autoshoot-btn" type="button" class="toggle-btn">Auto: OFF</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/audio.js"></script>
  <script src="js/gore.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/xl-mode.js"></script>
  <script src="js/modes/registry.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/modes/zombie-arena.js"></script>
  <script src="js/modes/leaderboard.js"></script>
  <script src="js/modes/topdown-modes.js"></script>
  <script src="js/modes/waves.js"></script>
  <script src="js/modes/animated-xl.js"></script>
  <script src="js/modes/drone-drive.js"></script>
  <script src="js/modes/jet-side.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
